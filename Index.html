<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythmus-Baukasten</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --slot-bg: #ffffff;
            --highlight-color: #ff0000;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Verhindert das versehentliche Markieren von Text beim Touch-Ziehen */
            user-select: none; 
        }

        /* --- Bedienfeld (Controls) --- */
        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            font-size: 1.5rem;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #2E7D32;
        }
        
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        input[type="range"] {
            width: 150px;
            height: 20px;
        }

        input[type="checkbox"] {
            width: 25px;
            height: 25px;
        }

        /* --- Rhythmus-Felder (Sequenzer) --- */
        .grid-container {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .label {
            font-size: 2rem;
            font-weight: bold;
        }

        .dropzone {
            width: 120px;
            height: 120px;
            background-color: var(--slot-bg);
            border: 4px dashed #ccc;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
        }

        /* Diese Klasse fügen wir später per JS hinzu, wenn das Feld "an der Reihe" ist */
        .dropzone.active {
            border-color: var(--highlight-color);
            background-color: #ffe6e6;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            transform: scale(1.05);
        }

        /* --- Karten-Stapel (Metacom) --- */
        .stacks-container {
            display: flex;
            gap: 50px;
        }

        .stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .card {
            width: 100px;
            height: 100px;
            background-color: white;
            border: 3px solid #666;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            /* Touch-Action ist wichtig für flüssiges Ziehen auf Tablets */
            touch-action: none; 
        }

        .card img {
            max-width: 80%;
            max-height: 80%;
            pointer-events: none; /* Verhindert Bugs beim Ziehen des Bildes */
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="playBtn">▶ Play</button>
        
        <div class="control-group">
            <label for="bpmSlider">Tempo: <span id="bpmValue">90</span> BPM</label>
            <input type="range" id="bpmSlider" min="40" max="160" value="90">
        </div>

        <div class="control-group">
            <label><input type="checkbox" id="metronomeToggle" checked> Metronom (Klick)</label>
        </div>
        <div class="control-group">
            <label><input type="checkbox" id="soundClapToggle" checked> Sound Klatschen</label>
        </div>
        <div class="control-group">
            <label><input type="checkbox" id="soundStompToggle" checked> Sound Stampfen</label>
        </div>
    </div>

    <div class="grid-container" id="sequencerGrid">
        <div class="column"><div class="label">1</div><div class="dropzone" data-step="0"></div></div>
        <div class="column"><div class="label">+</div><div class="dropzone" data-step="1"></div></div>
        <div class="column"><div class="label">2</div><div class="dropzone" data-step="2"></div></div>
        <div class="column"><div class="label">+</div><div class="dropzone" data-step="3"></div></div>
        <div class="column"><div class="label">3</div><div class="dropzone" data-step="4"></div></div>
        <div class="column"><div class="label">+</div><div class="dropzone" data-step="5"></div></div>
        <div class="column"><div class="label">4</div><div class="dropzone" data-step="6"></div></div>
        <div class="column"><div class="label">+</div><div class="dropzone" data-step="7"></div></div>
    </div>

    <div class="stacks-container">
        <div class="stack">
            <span>Klatschen</span>
            <div class="card" draggable="true" data-type="clap">
                👏
            </div>
        </div>
        <div class="stack">
            <span>Stampfen</span>
            <div class="card" draggable="true" data-type="stomp">
                🦶
            </div>
        </div>
    </div>
<script>
    // --- 1. Sound-Engine (Synthetische Platzhalter-Sounds) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const time = audioCtx.currentTime;

        if (type === 'metronome') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 800; // Hoher Klick
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.5, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
            osc.start(time);
            osc.stop(time + 0.1);
        } else if (type === 'clap') {
            // Rauschen für "Klatschen"
            const bufferSize = audioCtx.sampleRate * 0.2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.8, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
            noise.start(time);
        } else if (type === 'stomp') {
            // Tiefer "Wumms" für Stampfen
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.3);
            gain.gain.setValueAtTime(1, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
            osc.start(time);
            osc.stop(time + 0.3);
        }
    }

    // --- 2. Sequenzer Logik ---
    let isPlaying = false;
    let currentStep = 0;
    let nextNoteTime = 0;
    let timerID;

    const bpmSlider = document.getElementById('bpmSlider');
    const bpmValue = document.getElementById('bpmValue');
    const playBtn = document.getElementById('playBtn');
    const dropzones = document.querySelectorAll('.dropzone');

    // BPM Anzeige updaten
    bpmSlider.addEventListener('input', (e) => {
        bpmValue.textContent = e.target.value;
    });

    function nextNote() {
        const bpm = parseInt(bpmSlider.value);
        // Da wir Achtelnoten (1 und 2 und...) haben, ist ein Step ein halber Beat
        const secondsPerBeat = 60.0 / bpm;
        const secondsPerStep = secondsPerBeat / 2;
        nextNoteTime += secondsPerStep;
        currentStep = (currentStep + 1) % 8; // Zählt von 0 bis 7 und fängt wieder bei 0 an
    }

    function scheduleNote() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            playStep(currentStep, nextNoteTime);
            nextNote();
        }
        timerID = requestAnimationFrame(scheduleNote);
    }

    function playStep(stepIndex, time) {
        // 1. Optische Hervorhebung
        // Nutze setTimeout, damit die visuelle Änderung mit dem Audio-Timing synchronisiert ist
        setTimeout(() => {
            dropzones.forEach(dz => dz.classList.remove('active'));
            const currentZone = document.querySelector(`.dropzone[data-step="${stepIndex}"]`);
            if(currentZone) currentZone.classList.add('active');
        }, (time - audioCtx.currentTime) * 1000);

        // 2. Metronom abspielen
        if (document.getElementById('metronomeToggle').checked) {
            // Betonte Zählzeit (1, 2, 3, 4) etwas lauter/anders als die "und" (optional, hier einfach immer Klick)
            playSound('metronome');
        }

        // 3. Karte im Feld checken und Sound abspielen
        const currentZone = document.querySelector(`.dropzone[data-step="${stepIndex}"]`);
        if (currentZone && currentZone.hasChildNodes()) {
            const card = currentZone.firstChild;
            const cardType = card.getAttribute('data-type');
            
            if (cardType === 'clap' && document.getElementById('soundClapToggle').checked) {
                playSound('clap');
            } else if (cardType === 'stomp' && document.getElementById('soundStompToggle').checked) {
                playSound('stomp');
            }
        }
    }

    playBtn.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        isPlaying = !isPlaying;
        if (isPlaying) {
            playBtn.textContent = '⏸ Pause';
            playBtn.style.backgroundColor = '#f44336'; // Rot für Stop/Pause
            currentStep = 0;
            nextNoteTime = audioCtx.currentTime + 0.1;
            scheduleNote();
        } else {
            playBtn.textContent = '▶ Play';
            playBtn.style.backgroundColor = '#4CAF50'; // Wieder grün
            cancelAnimationFrame(timerID);
            dropzones.forEach(dz => dz.classList.remove('active')); // Alle Highlights entfernen
        }
    });

    // --- 3. Drag & Drop Logik (Maus) ---
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
        card.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', card.getAttribute('data-type'));
        });
    });

    dropzones.forEach(zone => {
        zone.addEventListener('dragover', (e) => {
            e.preventDefault(); // Erlaubt das Ablegen
            zone.style.borderColor = '#4CAF50'; // Zeigt an, dass man hier droppen kann
        });

        zone.addEventListener('dragleave', (e) => {
            zone.style.borderColor = '#ccc';
        });

        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.style.borderColor = '#ccc';
            
            const cardType = e.dataTransfer.getData('text/plain');
            if (!cardType) return;

            // Klon erstellen
            const newCard = document.createElement('div');
            newCard.classList.add('card');
            newCard.setAttribute('data-type', cardType);
            
            // Textinhalt (später Bilder) übernehmen
            if(cardType === 'clap') newCard.innerHTML = '👏';
            if(cardType === 'stomp') newCard.innerHTML = '🦶';

            // Klick-Event zum Löschen hinzufügen (motorisch einfacher als Drag&Drop in Mülleimer)
            newCard.addEventListener('click', () => {
                zone.innerHTML = '';
            });

            // Vorherigen Inhalt leeren und neue Karte einfügen
            zone.innerHTML = '';
            zone.appendChild(newCard);
        });
    });
</script>
</body>
</html>
