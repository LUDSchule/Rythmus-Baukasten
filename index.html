<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythmus-Baukasten</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --slot-bg: #ffffff;
            --highlight-color: #ff0000;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none; 
        }

        /* --- Bedienfeld (Controls) --- */
        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }

        button {
            font-size: 1.2rem;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #2E7D32;
            font-weight: bold;
        }
        
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-secondary {
            background-color: #2196F3;
            box-shadow: 0 4px 0 #1565C0;
        }

        .btn-cancel {
            background-color: #9e9e9e;
            box-shadow: 0 4px 0 #616161;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 1rem;
            font-weight: bold;
        }

        .toggles-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            border-left: 2px solid #eee;
            padding-left: 20px;
        }

        input[type="range"] { width: 120px; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }

        /* --- Rhythmus-Felder (Sequenzer) --- */
        .grid-container {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .label {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .dropzone {
            width: 100px;
            height: 100px;
            background-color: var(--slot-bg);
            border: 4px dashed #ccc;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
        }

        .dropzone.active {
            border-color: var(--highlight-color);
            background-color: #ffe6e6;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            transform: scale(1.05);
        }

        /* --- Karten-Stapel --- */
        .stacks-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .card {
            width: 90px;
            height: 90px;
            background-color: white;
            border: 3px solid #666;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            cursor: grab;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            touch-action: none; 
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Bild passt sich der Karte an */
            pointer-events: none;
        }

        .card-add {
            border: 3px dashed #2196F3;
            background-color: #e3f2fd;
            color: #2196F3;
            cursor: pointer;
        }

        /* --- Modal (Popup) --- */
        dialog {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }

        dialog::backdrop {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-form label {
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .modal-form input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="playBtn">▶ Play</button>
        
        <div class="control-group">
            <label for="bpmSlider">Tempo: <span id="bpmValue">90</span> BPM</label>
            <input type="range" id="bpmSlider" min="40" max="160" value="90">
        </div>

        <div class="control-group">
            <label><input type="checkbox" id="metronomeToggle" checked> Klick</label>
        </div>

        <div class="toggles-container" id="togglesContainer"></div>
    </div>

    <div class="grid-container" id="sequencerGrid">
        <div class="column"><div class="label">1</div><div class="dropzone" data-step="0"></div></div>
        <div class="column"><div class="label">+</div><div class="dropzone" data-step="1"></div></div>
        <div class="column"><div class="label">2</div><div class="dropzone" data-step="2"></div></div>
        <div class="column"><div class="label">+</div><div class="dropzone" data-step="3"></div></div>
        <div class="column"><div class="label">3</div><div class="dropzone" data-step="4"></div></div>
        <div class="column"><div class="label">+</div><div class="dropzone" data-step="5"></div></div>
        <div class="column"><div class="label">4</div><div class="dropzone" data-step="6"></div></div>
        <div class="column"><div class="label">+</div><div class="dropzone" data-step="7"></div></div>
    </div>

    <div class="stacks-container" id="stacksContainer"></div>

    <dialog id="addModal">
        <div class="modal-form">
            <h2>Neues Instrument</h2>
            <label>
                Name:
                <input type="text" id="customName" placeholder="z.B. Snare, Rassel..." required>
            </label>
            <label>
                Bild hochladen (optional):
                <input type="file" id="customImg" accept="image/*">
            </label>
            <label>
                Sound hochladen (optional):
                <input type="file" id="customAudio" accept="audio/*">
            </label>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" id="cancelBtn">Abbrechen</button>
                <button type="button" class="btn-secondary" id="saveBtn">Speichern</button>
            </div>
        </div>
    </dialog>

<script>
    // --- 1. System-Status & Datenbank ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Unsere "Datenbank" für alle Instrumente
    let instruments = {
        'clap': { id: 'clap', name: 'Klatschen', emoji: '👏', imgSrc: 'clap.png', audioFile: 'clap.mp3', audioBuffer: null, synth: 'clap', active: true },
        'stomp': { id: 'stomp', name: 'Stampfen', emoji: '🦶', imgSrc: 'stomp.png', audioFile: 'stomp.mp3', audioBuffer: null, synth: 'stomp', active: true }
    };

    // --- 2. Initialisierung & Lade-Logik ---
    async function initApp() {
        // Versuche für die Standard-Instrumente Audio-Dateien aus dem Ordner zu laden
        for (let key in instruments) {
            const inst = instruments[key];
            if (inst.audioFile) {
                try {
                    const response = await fetch(inst.audioFile);
                    if (response.ok) {
                        const arrayBuffer = await response.arrayBuffer();
                        inst.audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    }
                } catch(e) {
                    console.log(`Kein Sound gefunden für ${inst.name}. Nutze Synthesizer.`);
                }
            }
        }
        renderUI();
    }

    // --- 3. UI Generierung ---
    function renderUI() {
        const stacksContainer = document.getElementById('stacksContainer');
        const togglesContainer = document.getElementById('togglesContainer');
        
        stacksContainer.innerHTML = '';
        togglesContainer.innerHTML = '';

        // 1. Checkboxen generieren
        for (let key in instruments) {
            const inst = instruments[key];
            const label = document.createElement('label');
            label.style.display = 'flex';
            label.style.alignItems = 'center';
            label.style.gap = '5px';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = inst.active;
            checkbox.addEventListener('change', (e) => { inst.active = e.target.checked; });

            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(inst.name));
            togglesContainer.appendChild(label);
        }

        // 2. Kartenstapel generieren
        for (let key in instruments) {
            const inst = instruments[key];
            
            const stack = document.createElement('div');
            stack.classList.add('stack');
            
            const title = document.createElement('span');
            title.textContent = inst.name;
            
            const card = createVisualCard(inst, true); // true = ist das Original im Stapel
            card.setAttribute('draggable', 'true');
            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', inst.id);
            });

            stack.appendChild(title);
            stack.appendChild(card);
            stacksContainer.appendChild(stack);
        }

        // 3. "Plus" Stapel hinzufügen
        const addStack = document.createElement('div');
        addStack.classList.add('stack');
        addStack.innerHTML = `<span>Neu</span><div class="card card-add">+</div>`;
        addStack.addEventListener('click', () => { document.getElementById('addModal').showModal(); });
        stacksContainer.appendChild(addStack);
    }

    // Hilfsfunktion: Baut das Aussehen einer Karte (Bild oder Emoji)
    function createVisualCard(inst, isDraggable) {
        const card = document.createElement('div');
        card.classList.add('card');
        card.setAttribute('data-type', inst.id);
        
        if (inst.imgSrc) {
            const img = document.createElement('img');
            img.src = inst.imgSrc;
            // Fallback, falls Bild nicht existiert (z.B. clap.png fehlt)
            img.onerror = () => { 
                img.style.display = 'none'; 
                card.innerHTML = inst.emoji; 
            };
            card.appendChild(img);
        } else {
            card.innerHTML = inst.emoji;
        }
        return card;
    }

    // --- 4. Eigene Instrumente hochladen (Modal Logik) ---
    const addModal = document.getElementById('addModal');
    
    document.getElementById('cancelBtn').addEventListener('click', () => {
        addModal.close();
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const nameInput = document.getElementById('customName').value;
        const imgFile = document.getElementById('customImg').files[0];
        const audioFile = document.getElementById('customAudio').files[0];

        if (!nameInput) return alert('Bitte gib einen Namen ein!');

        const newId = 'custom_' + Date.now();
        const newInst = {
            id: newId,
            name: nameInput,
            emoji: '🎵', // Standard-Emoji, wenn kein Bild
            imgSrc: null,
            audioBuffer: null,
            synth: null, // Custom sounds haben keinen Synthesizer-Fallback
            active: true
        };

        // Bild verarbeiten
        if (imgFile) {
            newInst.imgSrc = URL.createObjectURL(imgFile);
        }

        // Audio verarbeiten
        if (audioFile) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const arrayBuffer = await audioFile.arrayBuffer();
            newInst.audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        }

        instruments[newId] = newInst; // Zur "Datenbank" hinzufügen
        
        // Formular aufräumen und Modal schließen
        document.getElementById('customName').value = '';
        document.getElementById('customImg').value = '';
        document.getElementById('customAudio').value = '';
        addModal.close();

        renderUI(); // UI neu zeichnen
    });

    // --- 5. Sound-Engine ---
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const time = audioCtx.currentTime;

        if (type === 'metronome') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 800;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.5, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
            osc.start(time);
            osc.stop(time + 0.1);
            return;
        }

        const inst = instruments[type];
        if (!inst || !inst.active) return; // Wenn nicht aktiv, mach nichts

        if (inst.audioBuffer) {
            // Echte Audio-Datei abspielen
            const source = audioCtx.createBufferSource();
            source.buffer = inst.audioBuffer;
            source.connect(audioCtx.destination);
            source.start(time);
        } else if (inst.synth === 'clap') {
            // Synth Rauschen
            const bufferSize = audioCtx.sampleRate * 0.2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.8, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
            noise.start(time);
        } else if (inst.synth === 'stomp') {
            // Synth Wumms
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.3);
            gain.gain.setValueAtTime(1, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
            osc.start(time);
            osc.stop(time + 0.3);
        }
    }

    // --- 6. Sequenzer Logik ---
    let isPlaying = false;
    let currentStep = 0;
    let nextNoteTime = 0;
    let timerID;

    const bpmSlider = document.getElementById('bpmSlider');
    const bpmValue = document.getElementById('bpmValue');
    const playBtn = document.getElementById('playBtn');
    const dropzones = document.querySelectorAll('.dropzone');

    bpmSlider.addEventListener('input', (e) => { bpmValue.textContent = e.target.value; });

    function nextNote() {
        const secondsPerStep = (60.0 / parseInt(bpmSlider.value)) / 2;
        nextNoteTime += secondsPerStep;
        currentStep = (currentStep + 1) % 8;
    }

    function scheduleNote() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            playStep(currentStep, nextNoteTime);
            nextNote();
        }
        timerID = requestAnimationFrame(scheduleNote);
    }

    function playStep(stepIndex, time) {
        setTimeout(() => {
            dropzones.forEach(dz => dz.classList.remove('active'));
            const currentZone = document.querySelector(`.dropzone[data-step="${stepIndex}"]`);
            if(currentZone) currentZone.classList.add('active');
        }, (time - audioCtx.currentTime) * 1000);

        if (document.getElementById('metronomeToggle').checked) {
            playSound('metronome');
        }

        const currentZone = document.querySelector(`.dropzone[data-step="${stepIndex}"]`);
        if (currentZone && currentZone.hasChildNodes()) {
            const cardType = currentZone.firstChild.getAttribute('data-type');
            playSound(cardType);
        }
    }

    playBtn.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isPlaying = !isPlaying;
        if (isPlaying) {
            playBtn.textContent = '⏸ Pause';
            playBtn.style.backgroundColor = '#f44336';
            currentStep = 0;
            nextNoteTime = audioCtx.currentTime + 0.1;
            scheduleNote();
        } else {
            playBtn.textContent = '▶ Play';
            playBtn.style.backgroundColor = '#4CAF50';
            cancelAnimationFrame(timerID);
            dropzones.forEach(dz => dz.classList.remove('active'));
        }
    });

    // --- 7. Drag & Drop Logik für die Felder ---
    dropzones.forEach(zone => {
        zone.addEventListener('dragover', (e) => {
            e.preventDefault();
            zone.style.borderColor = '#4CAF50';
        });

        zone.addEventListener('dragleave', (e) => {
            zone.style.borderColor = '#ccc';
        });

        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.style.borderColor = '#ccc';
            
            const cardType = e.dataTransfer.getData('text/plain');
            if (!cardType || !instruments[cardType]) return;

            // Neue Karte anhand der Datenbank generieren
            const newCard = createVisualCard(instruments[cardType], false);
            
            // Klick zum Löschen (Motorisch einfacher)
            newCard.addEventListener('click', () => { zone.innerHTML = ''; });
            newCard.style.cursor = 'pointer';

            zone.innerHTML = '';
            zone.appendChild(newCard);
        });
    });

    // App starten
    initApp();

</script>
</body>
</html>
